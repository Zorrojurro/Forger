services:
  - type: web
    name: forger-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: gemini-2.0-flash
      - key: CORS_ORIGINS
        value: https://forger-ten.vercel.app,http://localhost:3000
      - key: PYTHON_VERSION
        value: 3.11.0
